<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forza — Scholarships</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>body{font-family: Inter, var(--font);}</style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="nav">
        <a class="brand" href="../index.html" aria-label="Forza Home">
          <span class="logo-mark" aria-hidden="true"></span>
          <span>FORZA</span>
        </a>

        <nav class="nav-links" aria-label="Primary">
          <a data-nav href="../index.html">Home</a>
          <a data-nav href="./scholarships.html">Scholarships</a>
          <a data-nav href="../index.html#features">Features</a>
          <a data-nav href="./programmes.html">programmes</a>
          <a data-nav href="../index.html#about">About forza</a>
          <a data-nav href="../index.html#contact">Contact</a>
          <a data-nav href="./volunteering.html">Volunteering</a>
        </nav>

        <div class="nav-actions">
          <button class="icon-btn" type="button" aria-label="Account">
            <img src="assets/icons/user.svg" alt="">
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="list-toolbar">
        <div class="searchbar">
          <input id="searchInput" type="text" placeholder="search" aria-label="Search scholarships" />
          <img class="icon" src="assets/icons/search.svg" alt="">
        </div>
        <button class="filter-trigger" id="filterTrigger" type="button" aria-label="Open filters">
          <img src="assets/icons/filter.svg" alt="">
        </button>
      </div>

      <div class="filter-panel" id="filterPanel" aria-label="Filters">
        <div class="filter-grid">
          <div class="field">
            <label for="filterCountry">Country</label>
            <select id="filterCountry"></select>
          </div>
          <div class="field">
            <label for="filterLevel">Study Level</label>
            <select id="filterLevel"></select>
          </div>
          <div class="field">
            <label for="filterFunding">Funding</label>
            <select id="filterFunding"></select>
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn btn-ghost btn-sm" id="filterReset" type="button">Reset</button>
          <button class="btn btn-primary btn-sm" type="button" onclick="document.getElementById('filterPanel').classList.remove('open')">Close</button>
        </div>
      </div>

      <div id="scholarshipList" class="cards-col"></div>

      <div style="text-align:center; margin-top: 12px;">
        <button class="btn btn-primary btn-sm" id="viewMoreBtn" type="button">View more</button>
      </div>
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <a class="brand" href="index.html">
          <span class="logo-mark" aria-hidden="true"></span>
          <span>FORZA</span>
        </a>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="scholarships.html">Scholarships</a>
          <a href="features.html">Features</a>
          <a href="programmes.html">programmes</a>
          <a href="about.html">About forza</a>
          <a href="contact.html">Contact</a>
          <a href="volunteering.html">Volunteering</a>
        </div>
      </div>

      <div class="footer-bottom">
        <div>© 2025 Forza. All rights reserved.</div>
        <div class="social" aria-label="Social links">
          <a href="#" aria-label="Instagram"><img src="assets/icons/instagram.svg" alt=""></a>
          <a href="#" aria-label="Website"><img src="assets/icons/globe.svg" alt=""></a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
